trigger:
- main

pool:
  name: my-agent

variables:
- group: devsecops-secrets

stages:

# -------------------------
# 🔍 SONAR (DOCKER - NO EXTENSION)
# -------------------------
- stage: Sonar
  jobs:
  - job: SonarScan
    steps:
    - checkout: self

    - script: |
        docker run --rm \
        -e SONAR_TOKEN=$(SONAR_TOKEN) \
        -v $(pwd):/usr/src \
        sonarsource/sonar-scanner-cli \
        -Dsonar.projectKey=nehal-wandhare_gamehub \
        -Dsonar.organization=nehal-wandhare \
        -Dsonar.host.url=https://sonarcloud.io
      displayName: SonarCloud Scan

# -------------------------
# 🔐 SNYK SCAN
# -------------------------
- stage: Snyk
  jobs:
  - job: SnykScan
    steps:
    - checkout: self

    - script: |
        echo "Installing Snyk..."
        npm install -g snyk || true

        echo "Authenticating..."
        npx snyk auth $(SNYK_TOKEN)

        echo "Scanning frontend..."
        cd frontend
        npm install
        npx snyk test --severity-threshold=high > ../snyk-frontend.txt
        npx snyk monitor
        cd ..

        echo "Scanning backend..."
        cd backend
        npm install
        npx snyk test --severity-threshold=high > ../snyk-backend.txt
        npx snyk monitor
        cd ..
      displayName: Run Snyk Scan

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-frontend.txt
        artifactName: snyk-frontend

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-backend.txt
        artifactName: snyk-backend

# -------------------------
# 🐳 BUILD + TRIVY
# -------------------------
- stage: BuildAndScan
  jobs:
  - job: Build
    steps:
    - checkout: self

    - script: |
        docker-compose build
      displayName: Build Docker

    - script: |
        echo "Scanning frontend image..."
        docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image --scanners vuln s_frontend:latest > trivy-frontend.txt

        echo "Scanning backend image..."
        docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image --scanners vuln s_backend:latest > trivy-backend.txt
      displayName: Trivy Scan

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-frontend.txt
        artifactName: trivy-frontend

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-backend.txt
        artifactName: trivy-backend
# -------------------------
# 🚀 DEPLOY
# -------------------------
- stage: Deploy
  dependsOn: BuildAndScan
  jobs:
  - job: DeployJob
    steps:
    - script: |
        docker-compose down || true
        docker-compose up -d
      displayName: Deploy App