trigger:
- main

pool:
  name: my-agent

variables:
- group: devsecops-secrets

stages:

# -------------------------
# 🧪 TEST + COVERAGE
# -------------------------
- stage: Test
  jobs:
  - job: RunTests
    steps:
    - checkout: self

    - script: |
        echo "Installing dependencies..."
        cd frontend
        npm install

        echo "Running tests with coverage..."
        CI=true npm test -- --coverage --watchAll=false
      displayName: Run Tests

    # 🔍 Debug (keep it)
    - script: |
        echo "Checking coverage files..."
        ls -la frontend/coverage
        ls -la frontend/coverage/lcov-report || true
      displayName: Debug Coverage Files

    # ✅ IMPORTANT FIX (THIS WAS WRONG BEFORE)
    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: 'frontend/coverage/cobertura-coverage.xml'
        reportDirectory: 'frontend/coverage/lcov-report'
        failIfCoverageEmpty: true

# -------------------------
# 🔍 SONAR
# -------------------------
- stage: Sonar
  dependsOn: Test
  jobs:
  - job: SonarScan
    steps:
    - checkout: self

    - script: |
        docker run --rm \
        -e SONAR_TOKEN=$(SONAR_TOKEN) \
        -v $(pwd):/usr/src \
        sonarsource/sonar-scanner-cli \
        -Dsonar.projectKey=nehal-wandhare_gamehub \
        -Dsonar.organization=nehal-wandhare \
        -Dsonar.host.url=https://sonarcloud.io
      displayName: SonarCloud Scan

# -------------------------
# 🔐 SNYK
# -------------------------
- stage: Snyk
  dependsOn: Sonar
  jobs:
  - job: SnykScan
    steps:
    - checkout: self

    - script: |
        npm config set prefix ~/.npm-global
        export PATH=$PATH:~/.npm-global/bin

        npm install -g snyk snyk-to-html

        snyk auth $(SNYK_TOKEN)

        cd frontend
        npm install
        snyk test --json > ../snyk-frontend.json || true
        cd ..

        cd backend
        npm install
        snyk test --json > ../snyk-backend.json || true
        cd ..

        snyk-to-html -i snyk-frontend.json -o snyk-frontend.html
        snyk-to-html -i snyk-backend.json -o snyk-backend.html
      displayName: Snyk Scan

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-frontend.html
        artifactName: snyk-frontend

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-backend.html
        artifactName: snyk-backend

# -------------------------
# 🐳 BUILD + TRIVY
# -------------------------
- stage: BuildAndScan
  dependsOn: Snyk
  jobs:
  - job: Build
    steps:
    - checkout: self

    - script: |
        docker-compose build
      displayName: Build Docker

    - script: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image s_frontend:latest > trivy-frontend.txt || true

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image s_backend:latest > trivy-backend.txt || true
      displayName: Trivy Scan

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-frontend.txt
        artifactName: trivy-frontend

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-backend.txt
        artifactName: trivy-backend

# -------------------------
# 🚀 DEPLOY
# -------------------------
- stage: Deploy
  dependsOn: BuildAndScan
  jobs:
  - job: DeployJob
    steps:
    - script: |
        docker-compose down || true
        docker-compose up -d
      displayName: Deploy App