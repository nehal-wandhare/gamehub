trigger:
- main

pool:
  name: my-agent

variables:
- group: devsecops-secrets

stages:

# -------------------------
# 🔍 SONAR (DOCKER)
# -------------------------
- stage: Sonar
  jobs:
  - job: SonarScan
    steps:
    - checkout: self

    - script: |
        docker run --rm \
        -e SONAR_TOKEN=$(SONAR_TOKEN) \
        -v $(pwd):/usr/src \
        sonarsource/sonar-scanner-cli \
        -Dsonar.projectKey=nehal-wandhare_gamehub \
        -Dsonar.organization=nehal-wandhare \
        -Dsonar.host.url=https://sonarcloud.io
      displayName: SonarCloud Scan

# -------------------------
# 🔐 SNYK SCAN + HTML REPORT
# -------------------------
- stage: Snyk
  jobs:
  - job: SnykScan
    steps:
    - checkout: self

    - script: |
        echo "Auth..."
        npx snyk auth $(SNYK_TOKEN)

        echo "Frontend scan..."
        cd frontend
        npm install
        npx snyk test --json > ../snyk-frontend.json
        npx snyk monitor
        cd ..

        echo "Backend scan..."
        cd backend
        npm install
        npx snyk test --json > ../snyk-backend.json
        npx snyk monitor
        cd ..

        echo "Convert to HTML..."
        npm install -g snyk-to-html

        snyk-to-html -i snyk-frontend.json -o snyk-frontend.html
        snyk-to-html -i snyk-backend.json -o snyk-backend.html
      displayName: Snyk Scan + HTML

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-frontend.html
        artifactName: snyk-frontend-html

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-backend.html
        artifactName: snyk-backend-html

# -------------------------
# 🐳 BUILD + TRIVY (HTML)
# -------------------------
- stage: BuildAndScan
  jobs:
  - job: Build
    steps:
    - checkout: self

    - script: |
        docker-compose build
      displayName: Build Docker

    - script: |
        echo "Scanning frontend..."
        docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image --format json s_frontend:latest > trivy-frontend.json

        echo "Scanning backend..."
        docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image --format json s_backend:latest > trivy-backend.json

        echo "Convert to HTML..."
        docker run --rm \
        -v $(pwd):/root \
        aquasec/trivy convert --format html \
        -o /root/trivy-frontend.html /root/trivy-frontend.json

        docker run --rm \
        -v $(pwd):/root \
        aquasec/trivy convert --format html \
        -o /root/trivy-backend.html /root/trivy-backend.json
      displayName: Trivy Scan + HTML

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-frontend.html
        artifactName: trivy-frontend-html

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-backend.html
        artifactName: trivy-backend-html

# -------------------------
# 🚀 DEPLOY
# -------------------------
- stage: Deploy
  dependsOn: BuildAndScan
  jobs:
  - job: DeployJob
    steps:
    - script: |
        docker-compose down || true
        docker-compose up -d
      displayName: Deploy App