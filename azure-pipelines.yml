trigger:
- main

pool:
  name: my-agent

variables:
- group: devsecops-secrets

stages:

# -------------------------
# 🧪 TEST + COVERAGE
# -------------------------
- stage: Test
  jobs:
  - job: RunTests
    steps:
    - checkout: self

    - script: |
        echo "Running frontend tests..."
        cd frontend
        npm install
        npm test
      displayName: Run Tests

    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: 'JaCoCo'
        summaryFileLocation: 'frontend/coverage/lcov.info'
        reportDirectory: 'frontend/coverage'

# -------------------------
# 🔍 SONAR (DOCKER)
# -------------------------
- stage: Sonar
  dependsOn: Test
  jobs:
  - job: SonarScan
    steps:
    - checkout: self

    - script: |
        docker run --rm \
        -e SONAR_TOKEN=$(SONAR_TOKEN) \
        -v $(pwd):/usr/src \
        sonarsource/sonar-scanner-cli \
        -Dsonar.projectKey=nehal-wandhare_gamehub \
        -Dsonar.organization=nehal-wandhare \
        -Dsonar.host.url=https://sonarcloud.io
      displayName: SonarCloud Scan

# -------------------------
# 🔐 SNYK SCAN + HTML REPORT
# -------------------------
- stage: Snyk
  dependsOn: Sonar
  jobs:
  - job: SnykScan
    steps:
    - checkout: self

    - script: |
        echo "Auth..."
        npx snyk auth $(SNYK_TOKEN)

        echo "Frontend scan..."
        cd frontend
        npm install
        npx snyk test --json > ../snyk-frontend.json
        npx snyk monitor
        cd ..

        echo "Backend scan..."
        cd backend
        npm install
        npx snyk test --json > ../snyk-backend.json
        npx snyk monitor
        cd ..

        echo "Convert to HTML..."
        npx snyk-to-html -i snyk-frontend.json -o snyk-frontend.html
        npx snyk-to-html -i snyk-backend.json -o snyk-backend.html
      displayName: Snyk Scan + HTML

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-frontend.html
        artifactName: snyk-frontend-html

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: snyk-backend.html
        artifactName: snyk-backend-html

# -------------------------
# 🐳 BUILD + TRIVY (HTML)
# -------------------------
- stage: BuildAndScan
  dependsOn: Snyk
  jobs:
  - job: Build
    steps:
    - checkout: self

    - script: |
        docker-compose build
      displayName: Build Docker

    - script: |
        echo "Scanning frontend..."
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --format json s_frontend:latest > trivy-frontend.json

        echo "Scanning backend..."
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy image --format json s_backend:latest > trivy-backend.json

        echo "Download template..."
        wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

        echo "Convert frontend..."
        docker run --rm \
          -v $(pwd):/work \
          aquasec/trivy \
          convert --format template --template "@/work/html.tpl" \
          -o /work/trivy-frontend.html /work/trivy-frontend.json

        echo "Convert backend..."
        docker run --rm \
          -v $(pwd):/work \
          aquasec/trivy \
          convert --format template --template "@/work/html.tpl" \
          -o /work/trivy-backend.html /work/trivy-backend.json
      displayName: Trivy Scan + HTML

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-frontend.html
        artifactName: trivy-frontend-html

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: trivy-backend.html
        artifactName: trivy-backend-html

# -------------------------
# 🚀 DEPLOY
# -------------------------
- stage: Deploy
  dependsOn: BuildAndScan
  jobs:
  - job: DeployJob
    steps:
    - script: |
        docker-compose down || true
        docker-compose up -d
      displayName: Deploy App